services:
  llm-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    restart: unless-stopped
    expose:
      - "8080" # reachable from other containers on the compose network (caddy)
    ports:
      - "127.0.0.1:8090:8080" # direct localhost access for local dev/testing, bypassing Caddy/TLS
    volumes:
      # run `python scripts/get_model.py <name>` to populate ./models, then
      # point MODEL_PATH at the one you want; see scripts/get_model.py --list
      - ./models:/models:ro
    environment:
      MODEL_PATH: "${MODEL_PATH:-/models/qwen2.5-1.5b/model.gguf}"
      CTX_SIZE: "${CTX_SIZE:-8192}"   # context window; the model supports up to 32768
      SLOTS: "${SLOTS:-1}"            # concurrent requests in flight at once (-np)
      THREADS: "${THREADS:-2}"        # CPU threads used per in-flight request
      API_KEY: "${API_KEY:-}"         # if set, requires `Authorization: Bearer <key>`
    command: >
      -m ${MODEL_PATH:-/models/qwen2.5-1.5b/model.gguf}
      --host 0.0.0.0
      --port 8080
      -c ${CTX_SIZE:-8192}
      -np ${SLOTS:-1}
      -t ${THREADS:-2}
      ${API_KEY:+--api-key }${API_KEY}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # a real domain pointed at this VPS's IP is required for Caddy to
      # obtain a Let's Encrypt certificate; falls back to a local dev
      # cert (not trusted by browsers) if left unset
      DOMAIN: "${DOMAIN:-localhost}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - llm-server

volumes:
  caddy_data:
  caddy_config:
